<style>
:root{
  --p:#1A6FB5;--pd:#124F85;--pdeep:#0A3260;
  --sky:#E8F4FD;--skym:#C5DFF4;--skyd:#A0C8EC;
  --w:#FFF;--card:rgba(255,255,255,0.9);--bdr:rgba(26,111,181,0.15);
  --acc:#F5A623;--accd:#C07800;
  --green:#1E8A5E;--greenl:#27AE78;
  --red:#D32F2F;--ora:#E07A1F;--blue:#1565C0;--purple:#7B1FA2;
  --gray:#5A7A96;--grayl:#8AAFC8;
  --td:#0D2E4A;--tm:#2C5F82;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:linear-gradient(160deg,#C9E8F8,#E8F4FD,#D0E8F5);font-family:"Nunito",Georgia,serif;overflow:hidden;}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:82px;}
.scr::-webkit-scrollbar{display:none;}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--pdeep),var(--p));padding:50px 18px 15px;border-bottom:3px solid var(--acc);flex-shrink:0;box-shadow:0 4px 20px rgba(10,50,96,.25);}
.hrow{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--acc),var(--accd));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(245,166,35,.4);flex-shrink:0;}
.hsub{color:var(--skyd);font-size:9px;letter-spacing:2px;font-family:sans-serif;text-transform:uppercase;}
.htitle{color:#fff;font-size:19px;font-weight:700;}
.hmeta{color:var(--skym);font-size:11px;font-family:sans-serif;}
.back{background:none;border:none;color:var(--acc);font-size:24px;cursor:pointer;padding:0;margin-bottom:4px;display:block;}

/* NAV */
.nav{display:flex;background:rgba(10,50,96,.96);border-top:1px solid rgba(26,111,181,.3);backdrop-filter:blur(16px);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;background:none;border:none;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--grayl);font-family:sans-serif;font-size:9px;position:relative;}
.nb.on{color:var(--acc);}
.nb span:first-child{font-size:19px;}
.ndot{width:4px;height:4px;border-radius:2px;background:var(--acc);}
.nbdg{position:absolute;top:5px;right:50%;transform:translateX(10px);background:var(--red);color:#fff;font-size:8px;font-weight:700;font-family:sans-serif;padding:1px 4px;border-radius:10px;min-width:14px;text-align:center;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(26,111,181,.07);}
.clbl{color:var(--p);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-family:sans-serif;margin-bottom:9px;font-weight:700;}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:16px 16px 0;}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:13px;}
.sv{font-size:26px;font-weight:700;line-height:1;}
.sl{color:var(--gray);font-size:10px;font-family:sans-serif;margin-top:2px;}

/* SECTIONS */
.sec{padding:16px 16px 0;}
.stl{color:var(--pd);font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:sans-serif;margin-bottom:10px;font-weight:700;}

/* ACTION CARD */
.ac{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:12px;margin-bottom:8px;cursor:pointer;}
.ac:active{transform:scale(0.98);}
.aib{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.al{color:var(--td);font-size:13px;font-weight:600;}
.as{color:var(--gray);font-size:11px;font-family:sans-serif;margin-top:1px;}
.chv{color:var(--p);font-size:20px;margin-left:auto;}

/* BADGE */
.bdg{border-radius:20px;padding:3px 8px;font-size:9px;font-weight:700;font-family:sans-serif;white-space:nowrap;flex-shrink:0;}

/* GRIEF CARD */
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:13px;margin-bottom:9px;cursor:pointer;}
.gc:active{transform:scale(0.98);}
.gct{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;}
.gttl{color:var(--td);font-size:13px;font-weight:600;flex:1;line-height:1.3;}
.gmeta{color:var(--gray);font-size:10px;font-family:sans-serif;display:flex;gap:7px;flex-wrap:wrap;}
.ppill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600;font-family:sans-serif;margin-top:5px;}

/* FORM */
.fw{padding:16px;}
.fl{margin-bottom:15px;}
.flbl{color:var(--pd);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-family:sans-serif;display:block;margin-bottom:6px;font-weight:700;}
.fi{width:100%;background:#fff;border:1.5px solid var(--skyd);border-radius:9px;padding:11px;color:var(--td);font-size:13px;font-family:sans-serif;outline:none;-webkit-appearance:none;}
.fi:focus{border-color:var(--p);}
.fi::placeholder{color:var(--grayl);}
textarea.fi{resize:none;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.cb{background:#fff;border:1.5px solid var(--skyd);border-radius:9px;padding:9px 6px;cursor:pointer;text-align:center;}
.cb.on{background:rgba(26,111,181,.12);border-color:var(--p);}
.cbi{font-size:18px;margin-bottom:2px;}
.cbl{color:var(--gray);font-size:10px;font-family:sans-serif;}
.cb.on .cbl{color:var(--pd);font-weight:600;}
.pr{display:flex;gap:7px;}
.pb{flex:1;background:#fff;border:1.5px solid var(--skyd);border-radius:9px;padding:9px 0;cursor:pointer;text-align:center;font-family:sans-serif;font-size:11px;font-weight:600;color:var(--gray);}
.pbtn{width:100%;background:linear-gradient(135deg,var(--p),var(--pdeep));border:none;border-radius:13px;padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:sans-serif;box-shadow:0 4px 18px rgba(26,111,181,.3);}
.pbtn:active{transform:scale(0.98);}
.obtn{width:100%;background:none;color:var(--p);border:1.5px solid var(--skyd);border-radius:13px;padding:13px;font-family:sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
select.fi{color:var(--td);}

/* FILTERS */
.frow{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--skym);}
.frow::-webkit-scrollbar{display:none;}
.fb{background:#fff;border:1.5px solid var(--skyd);border-radius:20px;padding:5px 12px;cursor:pointer;white-space:nowrap;font-size:11px;font-weight:600;color:var(--gray);font-family:sans-serif;flex-shrink:0;}
.fb.on{background:var(--p);border-color:var(--p);color:#fff;}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--skym);margin-bottom:13px;}
.tab{flex:1;background:none;border:none;padding:9px 0;font-family:sans-serif;font-size:10px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.on{color:var(--p);border-bottom-color:var(--p);}

/* COMMENTS */
.cmsg{display:flex;gap:9px;margin-bottom:12px;}
.cava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:sans-serif;flex-shrink:0;}
.cbbl{flex:1;background:#fff;border:1px solid var(--bdr);border-radius:12px;border-top-left-radius:3px;padding:9px 11px;}
.cname{color:var(--pd);font-size:11px;font-weight:700;font-family:sans-serif;}
.ctag{display:inline-block;border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700;font-family:sans-serif;margin-top:3px;}

/* INFO GRID */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.ic{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:10px;}
.im{color:var(--gray);font-size:9px;font-family:sans-serif;margin-bottom:2px;}
.iv{color:var(--td);font-size:12px;font-weight:600;font-family:sans-serif;}

/* NOTIF */
.nitem{display:flex;gap:10px;padding:12px;border-bottom:1px solid var(--skym);cursor:pointer;}
.nitem.unread{background:rgba(26,111,181,.05);border-radius:10px;margin-bottom:4px;border-bottom:none;}

/* SETTINGS */
.sgroup{margin-bottom:18px;}
.sgrouptitle{color:var(--pd);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:sans-serif;font-weight:700;margin-bottom:10px;padding:0 16px;}
.sitem{display:flex;align-items:center;gap:12px;background:var(--card);border-bottom:1px solid var(--skym);padding:14px 16px;cursor:pointer;}
.sitem:first-of-type{border-radius:13px 13px 0 0;}
.sitem:last-of-type{border-radius:0 0 13px 13px;border-bottom:none;}
.sitem:only-of-type{border-radius:13px;}
.sicon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sttl{color:var(--td);font-size:13px;font-weight:600;font-family:sans-serif;}
.ssub{color:var(--gray);font-size:11px;font-family:sans-serif;margin-top:1px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,30,60,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:480px;animation:mup .3s ease;}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{color:var(--td);font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.mclose{background:var(--sky);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* DASHBOARD */
.hero{background:linear-gradient(135deg,var(--pdeep),var(--p));border-radius:14px;padding:20px;text-align:center;margin-bottom:13px;box-shadow:0 6px 22px rgba(10,50,96,.18);}
.btrack{width:100%;height:6px;background:var(--skym);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.bfill{height:100%;border-radius:3px;}

/* LOGIN */
.lw{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100dvh;padding:28px 22px;background:linear-gradient(160deg,#C9E8F8,#E8F4FD,#D0E8F5);}
.lcard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(26,111,181,.14);}
.llogo{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,var(--acc),var(--accd));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;box-shadow:0 4px 14px rgba(245,166,35,.38);}

/* MISC */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.pulse{animation:pulse 1.5s infinite;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:28px;font-size:12px;font-weight:600;font-family:sans-serif;z-index:9999;color:#fff;box-shadow:0 4px 18px rgba(0,0,0,.18);pointer-events:none;animation:tin .3s ease;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes sup{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:sup .3s ease;}
.empty{text-align:center;padding:40px 18px;color:var(--gray);font-family:sans-serif;}
.dvdr{height:1px;background:var(--skym);margin:14px 0;}
.pill{border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;font-family:sans-serif;}

/* ── HOME VIVANT ── */
.home-hero{position:relative;overflow:hidden;background:linear-gradient(160deg,#0A1628 0%,#0D2E4A 50%,#0A3260 100%);padding:22px 18px 26px;margin-bottom:0;}
.home-hero-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.hero-orb{position:absolute;border-radius:50%;filter:blur(60px);animation:orbpulse 6s ease-in-out infinite alternate;}
@keyframes orbpulse{0%{transform:scale(1) translate(0,0);opacity:.3;}100%{transform:scale(1.2) translate(10px,-10px);opacity:.5;}}
.hero-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(245,166,35,.15) 1px,transparent 1px);background-size:22px 22px;animation:dotmove 20s linear infinite;}
@keyframes dotmove{from{background-position:0 0;}to{background-position:44px 44px;}}
.hero-line{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.3),transparent);animation:lineslide 3s ease-in-out infinite;}
@keyframes lineslide{0%,100%{transform:translateX(-100%);}50%{transform:translateX(100%);}}
.hero-content{position:relative;z-index:2;}
.hero-greeting{font-family:'Nunito',sans-serif;font-size:11px;color:rgba(160,200,236,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;animation:fadeup .6s ease both;}
.hero-name{font-family:'Cinzel',Georgia,serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:2px;animation:fadeup .6s .1s ease both;}
.hero-role{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:3px 11px;margin-bottom:16px;animation:fadeup .6s .2s ease both;}
.hero-role-txt{font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:#F5A623;letter-spacing:1px;text-transform:uppercase;}
.hero-stats-row{display:flex;gap:8px;animation:fadeup .6s .3s ease both;}
.hstat{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 8px;text-align:center;backdrop-filter:blur(8px);}
.hstat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#fff;line-height:1;}
.hstat-lbl{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(160,200,236,.6);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.hstat.accent .hstat-val{color:#F5A623;}
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.home-actions{padding:18px 16px 0;}
.ha-title{font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.ha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ha-card{border-radius:14px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;}
.ha-card:active{transform:scale(0.96);}
.ha-card-icon{font-size:26px;margin-bottom:8px;display:block;}
.ha-card-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;line-height:1.2;margin-bottom:3px;}
.ha-card-sub{font-family:'Nunito',sans-serif;font-size:10px;opacity:.7;line-height:1.3;}
.ha-card-shine{position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none;}
.ha-wide{border-radius:14px;padding:15px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:transform .15s;}
.ha-wide:active{transform:scale(0.98);}
.ha-wide-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ha-wide-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;}
.ha-wide-sub{font-family:'Nunito',sans-serif;font-size:11px;opacity:.7;margin-top:2px;}
.ha-wide-arrow{margin-left:auto;font-size:20px;opacity:.5;}
.home-recent{padding:0 16px 22px;}
.recent-title{font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.alert-banner{margin:14px 16px 0;background:linear-gradient(135deg,rgba(183,28,28,.15),rgba(183,28,28,.08));border:1px solid rgba(183,28,28,.3);border-radius:13px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.alert-pulse{width:10px;height:10px;border-radius:50%;background:#D32F2F;flex-shrink:0;animation:pulse 1.2s infinite;}
.alert-text{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#D32F2F;flex:1;}
.date-badge{background:rgba(26,111,181,.12);border:1px solid rgba(26,111,181,.2);border-radius:20px;padding:4px 12px;font-family:'Nunito',sans-serif;font-size:10px;color:var(--p);font-weight:600;display:inline-block;margin:0 16px 14px;}

/* LOGIN CARD — fond clair */

function toast(msg,type='ok'){
  document.querySelectorAll('.toast').forEach(x=>x.remove());
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=type==='err'?'#D32F2F':type==='warn'?'#E07A1F':'#1E8A5E';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}
function go(screen,data={}){
  S.screen=screen;Object.assign(S,data);
  render();
  const s=document.getElementById('scr');if(s)s.scrollTop=0;
}
function stats(){
  const g=S.griefs;
  return{total:g.length,
    nouveau:g.filter(x=>x.status==='nouveau').length,
    enCours:g.filter(x=>x.status==='en-cours').length,
    resolu:g.filter(x=>x.status==='resolu'||x.status==='clos').length,
    critique:g.filter(x=>x.priorite==='critique'&&!['resolu','clos','rejete'].includes(x.status)).length,
    urgente:g.filter(x=>x.priorite==='urgente'&&!['resolu','clos','rejete'].includes(x.status)).length,
  };
}
function myNotifs(){return getNotifs().filter(n=>n.userId===S.user?.id);}
function unread(){return myNotifs().filter(n=>!n.lu).length;}
function escalades(){
  const days=S.settings.escaladeDays||7;
  return S.griefs.filter(g=>{
    if(['resolu','clos','rejete'].includes(g.status))return false;
    return Math.floor((Date.now()-new Date(g.date).getTime())/86400000)>days;
  });
}
function daysOld(g){return Math.floor((Date.now()-new Date(g.date).getTime())/86400000);}
function canEdit(g){
  if(S.user?.role==='admin')return true;
  if(S.user?.role==='manager'&&g.managerId===S.user.id)return true;
  if(S.user?.role==='agent'&&g.agentId===S.user.id&&g.status==='nouveau')return true;
  return false;
}

// FIX MAJEUR : on cherche l'utilisateur sans filtrer par rôle
function doLogin(){
  const u=document.getElementById('lu')?.value.trim();
  const p=document.getElementById('lp')?.value.trim();
  const user=getUsers().find(x=>x.id===u&&x.password===p&&x.actif!==false);

  S.user=user;S.settings=getSettings();
  go('home');
}

function renderNav(){

}

    <div class="home-recent">
      <div class="recent-title">Dernières plaintes</div>

            <div style="font-family:'Cinzel',serif;color:var(--pd);font-size:14px;font-weight:600;margin-bottom:6px">Aucune plainte enregistrée</div>

// GRIEF CARD
// ══════════════════════════════════════════════════
function gcrd(g){
  const st=STATUS[g.status];const esc=escalades().find(x=>x.id===g.id);
  return `<div class="gc" onclick="openG('${g.id}')" style="border-left:3px solid ${st.c};">
    <div class="gct">
      <div class="gttl" style="font-family:'Nunito',sans-serif;font-weight:800">${g.titre}</div>
      <span class="bdg" style="background:${st.bg};color:${st.c}">${st.i} ${st.l}</span>
    </div>
    <div class="gmeta" style="font-family:'Nunito',sans-serif;">
      <span>🔖 ${g.id}</span><span>📅 ${g.date}</span>
      ${g.dept?`<span>🏢 ${g.dept}</span>`:''}
      ${esc?'<span style="color:var(--red);font-weight:800;font-family:Nunito,sans-serif">⚠️ Escalade</span>':''}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;">
      <span class="ppill" style="background:${PC[g.priorite]||'#1E8A5E'}15;color:${PC[g.priorite]||'#1E8A5E'};font-family:'Nunito',sans-serif;">⚡ ${g.priorite}</span>
      ${g.comments?.length?`<span style="font-size:10px;font-family:'Nunito',sans-serif;color:var(--gray)">💬 ${g.comments.length}</span>`:''}
      ${g.photos?.length?`<span style="font-size:10px;font-family:'Nunito',sans-serif;color:var(--gray)">📸 ${g.photos.length}</span>`:''}
      ${g.managerId?`<span style="font-size:10px;font-family:'Nunito',sans-serif;color:var(--blue)">👔 Assigné</span>`:''}
      ${g.complementsCount>0?`<span style="font-size:10px;font-family:'Nunito',sans-serif;color:var(--green)">➕ ${g.complementsCount} ajout(s)</span>`:''}
    </div>
  </div>`;
}

      <div class="fl">
        <label class="flbl">Mode de réception</label>
        <select class="fi" id="fmod"><option value="">Sélectionnez...</option>

    <div style="height:20px"></div>
  </div>`;
}

// ══════════════════════════════════════════════════
// LISTE
// ══════════════════════════════════════════════════
function renderListe(){
  let g=S.griefs;
  if(S.user?.role==='manager') g=g.filter(x=>!x.managerId||x.managerId===S.user.id||x.dept===S.user.dept);
  if(S.fs!=='tous') g=g.filter(x=>x.status===S.fs);
  if(S.fd!=='tous') g=g.filter(x=>x.dept===S.fd);
  return `
    <div class="frow">
      <button class="fb ${S.fs==='tous'?'on':''}" onclick="S.fs='tous';render()">Tous</button>
      ${Object.entries(STATUS).map(([v,c])=>`<button class="fb ${S.fs===v?'on':''}" onclick="S.fs='${v}';render()">${c.i} ${c.l}</button>`).join('')}
    </div>
    <div class="frow" style="padding-top:8px;padding-bottom:8px;">
      <button class="fb ${S.fd==='tous'?'on':''}" onclick="S.fd='tous';render()">Tous dép.</button>
      ${DEPTS.map(d=>`<button class="fb ${S.fd===d?'on':''}" onclick="S.fd='${d}';render()">${d}</button>`).join('')}
    </div>
    <div style="padding:14px 16px 18px;">
      ${g.length===0?`<div class="empty"><span style="font-size:42px;display:block;margin-bottom:9px">📭</span>Aucune plainte trouvée</div>`:g.map(x=>gcrd(x)).join('')}
    </div>`;
}

// DETAIL
// ══════════════════════════════════════════════════
function renderDetail(){
  const g=S.sel;if(!g)return '';
  const wfi=['nouveau','en-cours','en-attente','resolu','clos'].indexOf(g.status);
  const cat=CATS.find(c=>c.id===g.categorie);
  const users=getUsers();
  const managers=users.filter(u=>u.role==='manager'&&u.actif!==false);
  const tl=[
    {id:'info',l:'📋 Info'},
    {id:'suivi',l:`🔄 Suivi ${g.historique?.length?`(${g.historique.length})`:''}`},
    {id:'commentaires',l:`💬 ${g.comments?.length||0}`},
    {id:'complements',l:`➕ Ajouts ${g.complements?.length?`(${g.complements.length})`:''}`},
    {id:'pieces',l:`📎 ${(g.photos?.length||0)+(g.docs?.length||0)}`},
  ];
  return `<div style="padding:15px">
    <div class="tabs">${tl.map(t=>`<button class="tab ${S.dtab===t.id?'on':''}" onclick="S.dtab='${t.id}';render()">${t.l}</button>`).join('')}</div>

    ${S.dtab==='info'?renderDetailInfo(g,cat,wfi,users,managers):''}
    ${S.dtab==='suivi'?renderDetailSuivi(g):''}
    ${S.dtab==='commentaires'?renderDetailComments(g):''}
    ${S.dtab==='complements'?renderDetailComplements(g):''}
    ${S.dtab==='pieces'?renderDetailPieces(g):''}
    <div style="height:18px"></div>
  </div>`;
}

function renderDetailSuivi(g){
  return `<div class="card">
    <div class="clbl">Historique complet des actions</div>
    ${(g.historique||[]).length===0?`<div class="empty">Aucune action enregistrée</div>`:
      (g.historique||[]).map((h,i)=>`
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <div style="display:flex;flex-direction:column;align-items:center;width:12px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${i===0?'var(--acc)':'var(--grayl)'};margin-top:2px;flex-shrink:0;"></div>
          ${i<(g.historique.length-1)?`<div style="width:1px;flex:1;background:rgba(26,111,181,.2);margin:3px 0;"></div>`:''}
        </div>
        <div style="flex:1;padding-bottom:3px;">
          <div style="color:var(--td);font-size:12px;font-family:sans-serif">${h.action}</div>
          <div style="color:var(--gray);font-size:10px;font-family:sans-serif;margin-top:1px">${h.date} · ${h.auteur}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

      (g.comments||[]).map(c=>{
        const u=users.find(x=>x.id===c.auteurId);
        const ct=CMTYPES.find(x=>x.id===c.type)||CMTYPES[0];
        return `<div class="cmsg">
          <div class="cava" style="background:${RC[u?.role||'agent']}22;color:${RC[u?.role||'agent']}">${(c.auteurNom||'?')[0]}</div>
          <div class="cbbl">
            <div><span class="cname">${c.auteurNom}</span><span style="color:var(--grayl);font-size:10px;font-family:sans-serif;margin-left:6px">${timeAgo(c.date)}</span></div>
            <span class="ctag" style="background:${ct.c}18;color:${ct.c}">${ct.l}</span>

function renderDash(){
  const g=S.griefs;const total=g.length;

  const esc=escalades();const crit=g.filter(x=>['critique','urgente'].includes(x.priorite)&&!['resolu','clos','rejete'].includes(x.status));

    <div class="tabs">
      ${[{id:'stats',l:'📊 '+t('dash_stats')},{id:'departements',l:'🏢 '+t('dash_depts')},{id:'alertes',l:`🚨 ${t('dash_alerts')}${esc.length+crit.length>0?` (${esc.length+crit.length})`:''}`}]

function openG(id){

}
function openEdit(id){
  const g=S.griefs.find(x=>x.id===id);if(!g)return;
  S.editMode=true;
  S.form={titre:g.titre,categorie:g.categorie,site:g.site,priorite:g.priorite,description:g.description,
    plaignant:g.plaignant||'',telephone:g.telephone||'',adresse:g.adresse||'',
    dept:g.dept||'',echeance:g.echeance||'',modeReception:g.modeReception||'',
    impactType:g.impactType||'',actionSouhaitee:g.actionSouhaitee||'',
    nbPersonnes:g.nbPersonnes||'',nomRepresentant:g.nomRepresentant||'',
    coords:g.coords||null,photos:g.photos||[],signature:g.signature||null,_editId:id};
  go('soumettre');
}
function submitGrief(){
  const plaignant=document.getElementById('fp')?.value.trim()||S.form.plaignant;
  const titre=document.getElementById('fti')?.value.trim()||S.form.titre;
  const desc=document.getElementById('fdesc')?.value.trim()||S.form.description;
  const tel=document.getElementById('ftel')?.value.trim()||S.form.telephone;
  const adr=document.getElementById('fadr')?.value.trim()||S.form.adresse;
  const dept=document.getElementById('fdept')?.value||S.form.dept;
  const ech=document.getElementById('fech')?.value||S.form.echeance;
  const mod=document.getElementById('fmod')?.value||S.form.modeReception;
  const imp=document.getElementById('fimp')?.value||S.form.impactType;
  const act=document.getElementById('fact')?.value||S.form.actionSouhaitee;
  const nbp=document.getElementById('fnbp')?.value||S.form.nbPersonnes;
  const rep=document.getElementById('frep')?.value.trim()||S.form.nomRepresentant;
  if(!plaignant||!titre||!S.form.categorie||!desc){toast('Remplissez tous les champs obligatoires *','err');return;}
  const btn=document.getElementById('sbtn');if(btn){btn.textContent='Envoi...';btn.disabled=true;}
  const canvas=document.getElementById('sigpad');
  const sig=canvas&&canvas.toDataURL()!=='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='?canvas.toDataURL():S.form.signature;
  setTimeout(()=>{
    if(S.editMode&&S.form._editId){
      const idx=S.griefs.findIndex(x=>x.id===S.form._editId);
      if(idx>=0){
        const g={...S.griefs[idx],titre,description:desc,plaignant,telephone:tel,adresse:adr,
          categorie:S.form.categorie,priorite:S.form.priorite,dept,echeance:ech,
          modeReception:mod,impactType:imp,actionSouhaitee:act,nbPersonnes:nbp,nomRepresentant:rep,
          coords:S.form.coords,photos:S.form.photos,signature:sig};
        if(!g.historique)g.historique=[];
        g.historique.unshift({date:today(),action:'Plainte modifiée par '+S.user.name,auteur:S.user.name});
        S.griefs[idx]=g;S.sel=g;
        if(g.managerId) addNotif(g.managerId,`✏️ Plainte ${g.id} modifiée par ${S.user.name}`,g.id);
      }
      S.editMode=false;saveGriefs(S.griefs);
      toast('✅ Modifications enregistrées');go('detail');
    } else {
      const id=`GRF-${new Date().getFullYear()}-${String(S.griefs.length+1).padStart(3,'0')}`;
      const g={id,titre,description:desc,plaignant,telephone:tel,adresse:adr,
        categorie:S.form.categorie,site:'Site Tongon',priorite:S.form.priorite,
        dept,echeance:ech,modeReception:mod,impactType:imp,actionSouhaitee:act,
        nbPersonnes:nbp,nomRepresentant:rep,
        coords:S.form.coords,photos:S.form.photos,signature:sig,
        agentId:S.user.id,agentName:S.user.name,managerId:null,
        status:'nouveau',date:today(),
        historique:[{date:today(),action:'Plainte soumise',auteur:S.user.name}],
        comments:[],complements:[],complementsCount:0,docs:[]};
      S.griefs.unshift(g);
      getUsers().filter(u=>u.role==='manager'&&u.actif!==false).forEach(m=>addNotif(m.id,`🆕 Nouvelle plainte: ${titre}`,id));
      if(S.user.role==='agent') getUsers().filter(u=>u.role==='admin').forEach(a=>addNotif(a.id,`📋 Nouvelle plainte soumise: ${titre}`,id));
      saveGriefs(S.griefs);
      S.form=emptyForm();
      toast('✅ Plainte soumise avec succès !');go('liste');
    }
  },600);
}
function addCmt(gid){
  const txt=document.getElementById('newcmt')?.value.trim();
  if(!txt){toast('Rédigez un commentaire','err');return;}
  const g=S.griefs.find(x=>x.id===gid);if(!g)return;
  if(!g.comments)g.comments=[];
  g.comments.push({id:uid(),auteurId:S.user.id,auteurNom:S.user.name,role:S.user.role,texte:txt,type:S.cmtype,date:new Date().toISOString()});
  if(!g.historique)g.historique=[];
  g.historique.unshift({date:today(),action:`${S.cmtype.charAt(0).toUpperCase()+S.cmtype.slice(1)} ajouté`,auteur:S.user.name});
  S.sel=g;saveGriefs(S.griefs);
  if(g.agentId&&g.agentId!==S.user.id) addNotif(g.agentId,`💬 ${S.user.name} a commenté la plainte ${gid}`,gid);
  if(g.managerId&&g.managerId!==S.user.id) addNotif(g.managerId,`💬 Nouveau commentaire sur ${gid}`,gid);
  toast('💬 Publié');render();
}
// Stockage temporaire des photos de complément
let _cPhotos=[];
function handleCPht(input){
  const files=Array.from(input.files);if(!files.length)return;
  files.forEach(f=>{const r=new FileReader();r.onload=e=>{_cPhotos.push(e.target.result);
    const pv=document.getElementById('cphv');if(pv){pv.innerHTML+=`<img src="${e.target.result}" style="width:65px;height:65px;border-radius:7px;object-fit:cover;border:1px solid var(--skyd)">`;}};r.readAsDataURL(f);});
}
function addComplement(gid){
  const txt=document.getElementById('ctxt')?.value.trim();
  const ctype=document.getElementById('ctype')?.value||'Information complémentaire';
  if(!txt&&_cPhotos.length===0){toast('Ajoutez du texte ou des photos','err');return;}
  const g=S.griefs.find(x=>x.id===gid);if(!g)return;
  if(!g.complements)g.complements=[];
  g.complements.push({id:uid(),auteurId:S.user.id,auteurNom:S.user.name,type:ctype,texte:txt,photos:[..._cPhotos],date:new Date().toISOString()});
  g.complementsCount=(g.complementsCount||0)+1;
  if(!g.historique)g.historique=[];
  g.historique.unshift({date:today(),action:`Complément ajouté: ${ctype}`,auteur:S.user.name});
  S.sel=g;_cPhotos=[];saveGriefs(S.griefs);
  if(g.managerId&&g.managerId!==S.user.id) addNotif(g.managerId,`➕ Complément ajouté sur ${gid} par ${S.user.name}`,gid);
  if(g.agentId&&g.agentId!==S.user.id) addNotif(g.agentId,`➕ Complément ajouté sur votre plainte ${gid}`,gid);
  toast('✅ Complément enregistré');render();
}
function assignMgr(){
  const mgrId=document.getElementById('smgr')?.value;if(!mgrId){toast('Sélectionnez un manager','err');return;}
  const g=S.griefs.find(x=>x.id===S.sel.id);if(!g)return;
  const mgr=getUsers().find(u=>u.id===mgrId);
  g.managerId=mgrId;
  if(!g.historique)g.historique=[];
  g.historique.unshift({date:today(),action:`Assigné à ${mgr?.name}`,auteur:S.user.name});
  if(g.status==='nouveau'){g.status='en-cours';g.historique.unshift({date:today(),action:'Statut → En cours',auteur:'Système'});}
  S.sel=g;saveGriefs(S.griefs);
  addNotif(mgrId,`👔 Vous êtes assigné à la plainte ${g.id}: ${g.titre}`,g.id);
  toast(`✅ Assigné à ${mgr?.name}`);render();
}
function chgStatus(id,status){
  const g=S.griefs.find(x=>x.id===id);if(!g)return;
  g.status=status;
  if(!g.historique)g.historique=[];
  g.historique.unshift({date:today(),action:`Statut → ${STATUS[status].l}`,auteur:S.user.name});
  S.sel=g;saveGriefs(S.griefs);
  if(g.agentId) addNotif(g.agentId,`🔄 Statut de ${id} → "${STATUS[status].l}"`,id);
  toast('✅ Statut mis à jour');render();
}
function handlePhotos(input){
  const files=Array.from(input.files);if(!files.length)return;
  S.form.photos=[];let done=0;

function clrSig(){const c=document.getElementById('sigpad');if(c){const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);}const h=document.getElementById('sighint');if(h)h.style.display='block';}
function bindSig(){
  const canvas=document.getElementById('sigpad');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#0A3260';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false,lx=0,ly=0;
  const pos=e=>{const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height,src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};};
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;const h=document.getElementById('sighint');if(h)h.style.display='none';};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;};
  canvas.onmouseup=canvas.ontouchend=()=>{drawing=false;};
}

function addUser(){
  const name=document.getElementById('nn')?.value.trim();
  const id=document.getElementById('ni')?.value.trim().toUpperCase();
  const role=document.getElementById('nr')?.value;
  const dept=document.getElementById('nd')?.value;
  const pwd=document.getElementById('np')?.value.trim();
  if(!name||!id||!pwd){toast('Remplissez tous les champs *','err');return;}
  if(pwd.length<6){toast('Mot de passe trop court','err');return;}
  const users=getUsers();

  users.push({id,name,role,dept,password:pwd,actif:true});

.hstat-lbl{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(160,200,236,.6);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.hstat.accent .hstat-val{color:#F5A623;}
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.home-actions{padding:18px 16px 0;}
.ha-title{font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.ha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ha-card{border-radius:14px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;}
.ha-card:active{transform:scale(0.96);}
.ha-card-icon{font-size:26px;margin-bottom:8px;display:block;}
.ha-card-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;line-height:1.2;margin-bottom:3px;}
.ha-card-sub{font-family:'Nunito',sans-serif;font-size:10px;opacity:.7;line-height:1.3;}
.ha-card-shine{position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none;}
.ha-wide{border-radius:14px;padding:15px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:transform .15s;}
.ha-wide:active{transform:scale(0.98);}
.ha-wide-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ha-wide-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;}
.ha-wide-sub{font-family:'Nunito',sans-serif;font-size:11px;opacity:.7;margin-top:2px;}
.ha-wide-arrow{margin-left:auto;font-size:20px;opacity:.5;}
.home-recent{padding:0 16px 22px;}
.recent-title{font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.alert-banner{margin:14px 16px 0;background:linear-gradient(135deg,rgba(183,28,28,.15),rgba(183,28,28,.08));border:1px solid rgba(183,28,28,.3);border-radius:13px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.alert-pulse{width:10px;height:10px;border-radius:50%;background:#D32F2F;flex-shrink:0;animation:pulse 1.2s infinite;}
.alert-text{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#D32F2F;flex:1;}
.date-badge{background:rgba(26,111,181,.12);border:1px solid rgba(26,111,181,.2);border-radius:20px;padding:4px 12px;font-family:'Nunito',sans-serif;font-size:10px;color:var(--p);font-weight:600;display:inline-block;margin:0 16px 14px;}
</style></head><body>
